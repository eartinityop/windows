version: '3.8'

services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "11"
      # Disable KVM requirement and use TCG emulation
      QEMU_ARGS: "-accel tcg -cpu max"
      # Add other QEMU parameters for better emulation
      QEMU_EXTRA_ARGS: "-machine type=pc,accel=tcg -smp 6 -m 16G -vga std"
    # Remove KVM device mapping since it's not available
    # devices:
    #   - /dev/kvm
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m
